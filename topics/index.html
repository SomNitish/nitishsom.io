<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<base href="/nitishsom.io/">
<title>Topics — Nitish Som</title>
<link rel="stylesheet" href="assets/shared.css">
<style>
.topics-hero{padding:64px 0 48px;border-bottom:1px solid var(--border)}
.topics-h1{font-size:clamp(32px,5vw,52px);font-weight:800;letter-spacing:-.04em;line-height:1.1;color:var(--text);margin-bottom:12px}
.topics-sub{font-size:16px;font-weight:300;color:var(--text2);line-height:1.7;max-width:580px}
.topics-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px;margin-top:48px}
.topic-card-full{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:28px;box-shadow:var(--sh);transition:all .2s;text-decoration:none;color:inherit;display:flex;flex-direction:column;gap:16px}
.topic-card-full:hover{box-shadow:var(--sh-lg);transform:translateY(-4px);border-color:var(--border2)}
.topic-top{display:flex;align-items:flex-start;gap:16px}
.topic-icon-lg{width:56px;height:56px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0;border:1px solid var(--border)}
.topic-name-lg{font-size:18px;font-weight:800;color:var(--text);letter-spacing:-.03em;margin-bottom:4px}
.topic-tagline-lg{font-size:13px;font-weight:300;color:var(--text2);line-height:1.5}
.topic-desc{font-size:13px;font-weight:300;color:var(--text2);line-height:1.7;margin-top:8px}
.topic-sources{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.source-tag{font-size:10px;font-weight:500;padding:3px 8px;border-radius:var(--rp);background:var(--bg2);color:var(--text3);border:1px solid var(--border)}
.topic-footer{display:flex;justify-content:space-between;align-items:center;margin-top:auto;padding-top:16px;border-top:1px solid var(--border)}
.topic-lessons-count{font-family:var(--mono);font-size:11px;color:var(--text3)}
.topic-progress-full{display:flex;align-items:center;gap:10px}
.tp-bar-lg{width:80px;height:4px;background:var(--bg2);border-radius:2px;overflow:hidden}
.tp-fill-lg{height:100%;border-radius:2px}
.topic-status-lg{font-size:10px;font-weight:700;padding:4px 10px;border-radius:var(--rp);text-transform:uppercase;letter-spacing:.04em}
</style>
</head>
<body>

<nav class="site-nav">
  <div class="container nav-inner">
    <a href="index.html" class="nav-logo"><span class="nav-logo-dot"></span>Nitish <em>Som</em></a>
    <div class="nav-links">
      <a href="index.html#about">About</a>
      <a href="index.html#experience">Experience</a>
      <a href="topics/index.html" class="act">Topics</a>
      <a href="index.html#projects">Projects</a>
      <a href="certifications/index.html">Certs</a>
      <a href="blog/index.html">Blog</a>
      <a href="roadmap.html">Roadmap</a>
    </div>
    <div class="nav-right">
      <button class="cmdk-btn"><span>Search</span><kbd>⌘K</kbd></button>
      <div id="avail-badge"><span class="pulse"></span>Open to remote</div>
    </div>
  </div>
</nav>

<section class="topics-hero">
  <div class="container fu">
    <div class="eyebrow">Topics</div>
    <h1 class="topics-h1">Learning hubs.</h1>
    <p class="topics-sub">Each topic is a deep-dive area I'm actively learning. Click any topic to see lessons, posts, and progress.</p>
  </div>
</section>

<section class="section" style="border:none">
  <div class="container fu">
    <div class="topics-grid fu-stagger" id="topics-grid"></div>
  </div>
</section>

<footer class="site-footer">
  <div class="container footer-inner">
    <div class="footer-left">
      <div class="footer-logo">Nitish <em>Som</em></div>
      <div class="footer-copy">© 2025 · monkincyber</div>
    </div>
    <div class="footer-links">
      <a href="topics/index.html">Topics</a>
      <a href="roadmap.html">Roadmap</a>
      <a href="sitemap.html">Sitemap</a>
      <a href="knowledge-graph.html">Knowledge graph</a>
    </div>
    <div class="footer-tz">IST · UTC+5:30</div>
  </div>
</footer>

<script src="assets/data.js"></script>
<script src="assets/cmdk.js"></script>
<script>
if(P.showAvailBadge)document.getElementById('avail-badge').style.display='flex';

const colorMap={green:'var(--green)',blue:'var(--blue)',purple:'var(--purple)',amber:'var(--amber)',teal:'var(--teal)',pink:'var(--pink)'};

document.getElementById('topics-grid').innerHTML=P.topics.map(t=>`
  <a class="topic-card-full" href="topics/${t.id}.html" style="border-top:4px solid ${colorMap[t.color]||'var(--green)'}">
    <div class="topic-top">
      <div class="topic-icon-lg" style="background:var(--${t.color}-l);border-color:var(--${t.color}-b);color:${colorMap[t.color]}">${t.icon}</div>
      <div class="topic-header">
        <div class="topic-name-lg">${t.name}</div>
        <div class="topic-tagline-lg">${t.tagline}</div>
      </div>
    </div>
    <div class="topic-desc">${t.description}</div>
    <div class="topic-sources">
      ${t.sources.map(s=>`<span class="source-tag">${s}</span>`).join('')}
    </div>
    <div class="topic-footer">
      <div class="topic-lessons-count">${t.lessons.length} lessons</div>
      <div class="topic-progress-full">
        <div class="tp-bar-lg"><div class="tp-fill-lg" style="width:${t.progress}%;background:${colorMap[t.color]}"></div></div>
        <span style="font-family:var(--mono);font-size:11px;color:var(--text3)">${t.progress}%</span>
      </div>
      <span class="topic-status-lg ${t.status==='active'?'ts-active':'ts-planned'}" style="${t.status==='active'?`background:var(--${t.color}-l);color:var(--${t.color}-t);border:1px solid var(--${t.color}-b)`:'background:var(--bg2);color:var(--text3);border:1px solid var(--border)'}">${t.status==='active'?'Active':'Planned'}</span>
    </div>
  </a>
`).join('');

const fObs=new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('vis');fObs.unobserve(e.target);}});},{threshold:.08});
document.querySelectorAll('.fu,.fu-stagger').forEach(el=>fObs.observe(el));
</script>
</body>
</html>
